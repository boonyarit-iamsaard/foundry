version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
          - '@next/*'
      react:
        patterns:
          - react
          - react-dom
          - '@types/react'
          - '@types/react-dom'
      eslint:
        patterns:
          - eslint
          - eslint-*
          - '@stylistic/eslint-plugin-js'
      tailwind:
        patterns:
          - tailwindcss
          - '@tailwindcss/*'
          - prettier-plugin-tailwindcss

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
