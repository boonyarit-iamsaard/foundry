name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - '**'

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Vercel CLI
        run: npm install --global vercel@53.0.1

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.workflow_run.head_branch }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Build production deployment
        if: github.event.workflow_run.head_branch == 'main'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.workflow_run.head_branch }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Build preview deployment
        if: github.event.workflow_run.head_branch != 'main'
        run: vercel build --target=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.workflow_run.head_branch }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy production
        if: github.event.workflow_run.head_branch == 'main'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.workflow_run.head_branch }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy preview
        if: github.event.workflow_run.head_branch != 'main'
        run: vercel deploy --prebuilt --target=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.workflow_run.head_branch }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
