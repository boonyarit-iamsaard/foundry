name: Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pull-request-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate

  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: checks
    if: >
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Install Vercel CLI
        run: pnpm dlx vercel@53.0.1 --version

      - name: Pull Vercel preview environment
        run: pnpm dlx vercel@53.0.1 pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.pull_request.head.ref }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Build preview deployment
        run: pnpm dlx vercel@53.0.1 build --target=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ENV: preview
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.pull_request.head.ref }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Deploy preview
        run: pnpm dlx vercel@53.0.1 deploy --prebuilt --target=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.pull_request.head.ref }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
