name: Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pull-request-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: checks
    if: >
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Vercel CLI
        run: npm install --global vercel@53.0.1

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.pull_request.head.ref }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Build preview deployment
        run: vercel build --target=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ENV: preview
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.pull_request.head.ref }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Deploy preview
        run: vercel deploy --prebuilt --target=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_REF: ${{ github.event.pull_request.head.ref }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
